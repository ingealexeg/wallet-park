<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso HUB Júpiter - TAS Seguridad</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root {
            --tas-rojo: #e32b21;
            --tas-negro-header: #1a1a1a;
            --tas-gris-fondo: #f4f4f4;
            --tas-blanco: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            background-color: var(--tas-gris-fondo); 
            display: flex; 
            flex-direction: column;
            min-height: 100vh;
        }

        /* FRANJA SUPERIOR */
        .header-tas {
            background-color: var(--tas-negro-header);
            padding: 15px 0;
            text-align: center;
            width: 100%;
        }

        .logo-header {
            max-width: 160px; /* Ajustado para mejor visibilidad */
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* CONTENEDOR SUBIDO */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 0 20px;
        }
        
        .card { 
            max-width: 400px; 
            width: 100%; 
            background: var(--tas-blanco); 
            padding: 25px 30px; 
            border-radius: 4px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border-top: 5px solid var(--tas-rojo);
            text-align: center;
            margin-top: 5px; /* Casi pegado a la franja gris */
            height: fit-content;
        }
        
        h2 { 
            text-transform: uppercase; 
            font-size: 1.1em; 
            letter-spacing: 0.5px;
            margin: 0 0 20px 0;
            color: #222;
        }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        
        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            padding: 14px; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 13px; 
            transition: 0.2s;
            text-transform: uppercase;
        }
        
        .btn-camera { background-color: var(--tas-rojo); color: white; }
        .btn-file { background-color: #222; color: white; }

        #video-container { 
            display: none; 
            margin-top: 15px; 
            border: 2px solid var(--tas-rojo);
            border-radius: 4px;
            overflow: hidden;
            line-height: 0;
        }
        
        #video { width: 100%; }
        
        #resultado-box { 
            margin-top: 20px; 
            padding: 15px; 
            background: #fff; 
            border: 1px dashed #ccc; 
            display: none; 
        }

        /* BOTÓN WALLET OFICIAL (Sin distorsión) */
        .wallet-button {
            display: inline-block;
            margin-top: 10px;
            transition: transform 0.2s ease;
        }
        .wallet-button:hover { transform: scale(1.03); }
        .wallet-button img { height: 45px; width: auto; }

        canvas { display: none; }
    </style>
</head>
<body>

    <div class="header-tas">
        <img src="logo_tas.png" alt="TAS Seguridad" class="logo-header">
    </div>

    <div class="main-container">
        <div class="card">
            <h2>Agrega tu QR a Google Wallet</h2>

            <div class="btn-group">
                <button class="btn btn-camera" onclick="abrirCamara()">📸 Activar Cámara</button>
                <label class="btn btn-file">
                    📂 Cargar Imagen o PDF
                    <input type="file" id="file-input" accept="image/*,application/pdf" style="display: none;">
                </label>
            </div>

            <div id="video-container">
                <video id="video"></video>
            </div>

            <div id="resultado-box">
                <p style="color: #666; font-size: 13px; margin: 0 0 10px 0;">QR Detectado</p>
                <div id="boton-wallet-container"></div>
            </div>
        </div>
    </div>

    <canvas id="hidden-canvas"></canvas>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const fileInput = document.getElementById('file-input');
    const resultadoBox = document.getElementById('resultado-box');
    const botonContainer = document.getElementById('boton-wallet-container');
    const video = document.getElementById('video');
    const videoContainer = document.getElementById('video-container');

    // Badge oficial de Google para evitar que se vea mal
    const googleWalletBadge = "https://upload.wikimedia.org/wikipedia/commons/b/b2/Add_to_Google_Wallet_badge.svg";

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        limpiarEstado();
        if (file.type === "application/pdf") await leerPDF(file);
        else leerImagen(file);
    };

    async function leerPDF(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({scale: 2});
        const canvas = document.getElementById('hidden-canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height; canvas.width = viewport.width;
        await page.render({canvasContext: context, viewport: viewport}).promise;
        detectarQR(canvas);
    }

    function leerImagen(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.getElementById('hidden-canvas');
                canvas.width = img.width; canvas.height = img.height;
                canvas.getContext('2d').drawImage(img, 0, 0);
                detectarQR(canvas);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function abrirCamara() {
        limpiarEstado();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.setAttribute("playsinline", true);
            video.play();
            videoContainer.style.display = 'block';
            requestAnimationFrame(tickCamara);
        } catch (err) { alert("Error de cámara. Usa HTTPS."); }
    }

    function tickCamara() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            const canvas = document.getElementById('hidden-canvas');
            const ctx = canvas.getContext('2d');
            canvas.height = video.videoHeight; canvas.width = video.videoWidth;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);
            if (code) {
                video.srcObject.getTracks().forEach(t => t.stop());
                videoContainer.style.display = 'none';
                detectarQR(canvas);
                return;
            }
        }
        requestAnimationFrame(tickCamara);
    }

    function detectarQR(canvas) {
        const ctx = canvas.getContext('2d');
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        
        if (code) {
            resultadoBox.style.display = 'block';
            botonContainer.innerHTML = `<span style="font-size: 12px; color: #999;">Generando pase...</span>`;
            
            fetch('https://park-wallet.ingealexeg.workers.dev/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ qr_data: code.data })
            })
            .then(res => res.json())
            .then(data => {
                botonContainer.innerHTML = `
                    <a href="${data.url}" target="_blank" class="wallet-button">
                        <img src="${googleWalletBadge}" alt="Add to Google Wallet">
                    </a>`;
            })
            .catch(() => { 
                botonContainer.innerHTML = `<span style="color:red; font-size:12px;">Error al conectar</span>`;
            });
        }
    }

    function limpiarEstado() {
        resultadoBox.style.display = 'none';
        botonContainer.innerHTML = '';
        videoContainer.style.display = 'none';
    }
</script>
</body>
</html>
