<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso HUB Júpiter - TAS Seguridad</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        /* IDENTIDAD TAS SEGURIDAD */
        :root {
            --tas-rojo: #e32b21;
            --tas-negro: #1a1a1a;
            --tas-gris-fondo: #f8f9fa;
            --tas-gris-oscuro: #333333;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
            margin: 0; 
            background-color: var(--tas-gris-fondo); 
            color: var(--tas-negro); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
        }
        
        .card { 
            max-width: 420px; 
            width: 90%; 
            background: #ffffff; 
            padding: 40px 30px; 
            border-radius: 2px; /* Estilo más cuadrado e industrial */
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            border-top: 6px solid var(--tas-rojo);
            text-align: center;
        }
        
        .logo { 
            max-width: 140px; 
            margin-bottom: 20px; 
        }
        
        h2 { 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-size: 20px; 
            margin-bottom: 10px;
            color: var(--tas-negro);
        }

        .subtitle { 
            font-size: 0.9em; 
            color: var(--tas-gris-oscuro); 
            margin-bottom: 30px; 
            line-height: 1.5;
        }
        
        .btn-group { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        
        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            padding: 16px; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 15px; 
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        
        .btn-camera { 
            background-color: var(--tas-rojo); 
            color: white; 
        }
        
        .btn-camera:hover { background-color: #c4221a; }
        
        .btn-file { 
            background-color: var(--tas-negro); 
            color: white; 
        }
        
        .btn-file:hover { background-color: #000000; }

        #video-container { 
            display: none; 
            margin-top: 20px; 
            border: 2px solid var(--tas-rojo);
            background: #000;
            line-height: 0;
        }
        
        #video { width: 100%; transform: scaleX(-1); }
        
        #resultado-box { 
            margin-top: 25px; 
            padding: 20px; 
            background: #fffafa; 
            border: 1px solid #ff000021; 
            display: none; 
        }

        #loading { color: var(--tas-rojo); font-weight: bold; margin: 10px 0; }
        
        /* BOTÓN WALLET ESTILO CHILERO */
        #boton-wallet-container { 
            margin-top: 15px; 
            display: flex; 
            justify-content: center; 
        }
        
        .wallet-img { 
            height: 52px; 
            transition: transform 0.2s; 
        }
        
        .wallet-img:hover { transform: scale(1.05); }

        canvas { display: none; }
    </style>
</head>
<body>

<div class="card">
    <img src="logo_tas.png" alt="TAS" class="logo" onerror="this.style.display='none'">
    
    <h2>HUB Júpiter</h2>
    <p class="subtitle">Escanea tu código de acceso para guardarlo en tu dispositivo.</p>

    <div class="btn-group">
        <button class="btn btn-camera" onclick="abrirCamara()">📸 Activar Cámara</button>
        <label class="btn btn-file">
            📂 Cargar Imagen / PDF
            <input type="file" id="file-input" accept="image/*,application/pdf" style="display: none;">
        </label>
    </div>

    <div id="video-container">
        <video id="video"></video>
    </div>

    <div id="resultado-box">
        <div id="status-text" style="color: var(--tas-rojo); font-weight: bold;">CÓDIGO DETECTADO</div>
        <div id="loading">Generando pase oficial...</div>
        <div id="boton-wallet-container"></div>
    </div>
</div>

<canvas id="hidden-canvas"></canvas>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const fileInput = document.getElementById('file-input');
    const resultadoBox = document.getElementById('resultado-box');
    const loading = document.getElementById('loading');
    const botonContainer = document.getElementById('boton-wallet-container');
    const video = document.getElementById('video');
    const videoContainer = document.getElementById('video-container');

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        limpiarEstado();
        if (file.type === "application/pdf") await leerPDF(file);
        else leerImagen(file);
    };

    async function leerPDF(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({scale: 2});
        const canvas = document.getElementById('hidden-canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height; canvas.width = viewport.width;
        await page.render({canvasContext: context, viewport: viewport}).promise;
        detectarQR(canvas);
    }

    function leerImagen(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.getElementById('hidden-canvas');
                canvas.width = img.width; canvas.height = img.height;
                canvas.getContext('2d').drawImage(img, 0, 0);
                detectarQR(canvas);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function abrirCamara() {
        limpiarEstado();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.setAttribute("playsinline", true);
            video.play();
            videoContainer.style.display = 'block';
            requestAnimationFrame(tickCamara);
        } catch (err) { alert("Error de cámara. Usa HTTPS."); }
    }

    function tickCamara() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            const canvas = document.getElementById('hidden-canvas');
            const ctx = canvas.getContext('2d');
            canvas.height = video.videoHeight; canvas.width = video.videoWidth;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);
            if (code) {
                video.srcObject.getTracks().forEach(t => t.stop());
                videoContainer.style.display = 'none';
                detectarQR(canvas);
                return;
            }
        }
        requestAnimationFrame(tickCamara);
    }

    function detectarQR(canvas) {
        const ctx = canvas.getContext('2d');
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        
        if (code) {
            resultadoBox.style.display = 'block';
            loading.style.display = 'block';
            
            fetch('https://park-wallet.ingealexeg.workers.dev/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ qr_data: code.data })
            })
            .then(res => res.json())
            .then(data => {
                loading.style.display = 'none';
                botonContainer.innerHTML = `
                    <a href="${data.url}" target="_blank">
                        <img src="https://storage.googleapis.com/wallet-external-assets-cloud-console/en-US/add-to-google-wallet.svg" 
                             class="wallet-img" alt="Add to Wallet">
                    </a>
                `;
            })
            .catch(() => { loading.innerText = "Error de conexión con el Worker."; });
        } else {
            alert("No se detectó código QR.");
        }
    }

    function limpiarEstado() {
        resultadoBox.style.display = 'none';
        botonContainer.innerHTML = '';
        loading.innerText = 'Generando pase oficial...';
    }
</script>
</body>
</html>
