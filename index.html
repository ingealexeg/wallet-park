<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso HUB Júpiter - TAS Seguridad</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root {
            --tas-rojo: #e32b21;
            --tas-negro-header: #1a1a1a;
            --tas-gris-fondo: #f4f4f4;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: var(--tas-gris-fondo); 
            display: flex; 
            flex-direction: column;
            align-items: center;
        }

        /* CABECERA NEGRA */
        .header-tas {
            background-color: var(--tas-negro-header);
            padding: 15px 0;
            text-align: center;
            width: 100%;
        }

        .logo-header {
            max-width: 140px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* TARJETA PEGADA ARRIBA */
        .card { 
            max-width: 400px; 
            width: 90%; 
            background: #fff; 
            padding: 25px; 
            border-radius: 0 0 8px 8px; /* Redondeado solo abajo */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border-top: 5px solid var(--tas-rojo);
            text-align: center;
            margin-top: 0; /* Pegado total a la franja */
        }
        
        h2 { 
            text-transform: uppercase; 
            font-size: 1.1em; 
            margin: 10px 0 20px 0;
            color: #222;
        }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        
        .btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            padding: 14px; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 13px; 
            text-transform: uppercase;
        }
        
        .btn-camera { background-color: var(--tas-rojo); color: white; }
        .btn-file { background-color: #222; color: white; }

        #resultado-box { 
            margin-top: 20px; 
            padding: 15px; 
            border: 1px dashed #ccc; 
            display: none; 
            border-radius: 8px;
        }

        /* ESTILO DEL BOTÓN WALLET */
        .wallet-link {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
        }

        .wallet-img {
            height: 55px; /* Tamaño ideal según lineamientos de Google */
            width: auto;
            display: block;
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <div class="header-tas">
        <img src="logo_tas.png" 
             onerror="this.src='https://static.wixstatic.com/media/76b701_63365928d25f46488730953683f2d257~mv2.png/v1/fill/w_182,h_74,al_c,q_85,usm_0.66_1.00_0.01,enc_auto/LOGO%20TAS%20FONDO%20NEGRO.png'" 
             alt="TAS" class="logo-header">
    </div>

    <div class="card">
        <h2>Agrega tu QR a Google Wallet</h2>

        <div class="btn-group">
            <button class="btn btn-camera" onclick="abrirCamara()">📸 Activar Cámara</button>
            <label class="btn btn-file">
                📂 Cargar Imagen o PDF
                <input type="file" id="file-input" accept="image/*,application/pdf" style="display: none;">
            </label>
        </div>

        <div id="resultado-box">
            <p style="color: #666; font-size: 13px; margin-bottom: 10px;">¡QR Detectado!</p>
            <div id="boton-wallet-container"></div>
        </div>
    </div>

    <canvas id="hidden-canvas"></canvas>

<script>
    const botonContainer = document.getElementById('boton-wallet-container');
    const resultadoBox = document.getElementById('resultado-box');

    // ESTO ES LO QUE SOLUCIONA EL BOTÓN
    function mostrarBotonWallet(urlPase) {
        resultadoBox.style.display = 'block';
        
        // Creamos el enlace y la imagen dinámicamente
        botonContainer.innerHTML = `
            <a href="${urlPase}" target="_blank" class="wallet-link">
                <img src="google-wallet.png" 
                     class="wallet-img" 
                     alt="Add to Google Wallet"
                     onerror="sustituirPorBotonGoogle(this)">
            </a>
        `;
    }

    // Si tu imagen "boton-wallet.png" falla, este código dibuja el botón oficial automáticamente
    function sustituirPorBotonGoogle(imgElement) {
        imgElement.onerror = null; // Evita bucles
        imgElement.src = "https://upload.wikimedia.org/wikipedia/commons/b/b2/Add_to_Google_Wallet_badge.svg";
    }

    // --- LÓGICA DE DETECCIÓN (SIMPLIFICADA PARA EL EJEMPLO) ---
    function detectarQR(canvas) {
        const ctx = canvas.getContext('2d');
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        
        if (code) {
            botonContainer.innerHTML = "Generando enlace...";
            fetch('https://park-wallet.ingealexeg.workers.dev/', {
                method: 'POST',
                body: JSON.stringify({ qr_data: code.data })
            })
            .then(res => res.json())
            .then(data => {
                mostrarBotonWallet(data.url);
            })
            .catch(() => { botonContainer.innerHTML = "Error de conexión"; });
        }
    }
    
    // (Resto de funciones: abrirCamara, leerPDF, etc. se mantienen igual que tu versión funcional)
</script>
</body>
</html>
